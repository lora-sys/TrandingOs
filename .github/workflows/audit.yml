name: Security Audit

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:        # manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts --allow-remote=all
      - name: Run npm audit (production only) — save JSON
        run: npm audit --omit=dev --audit-level=moderate --json > npm-audit-prod.json 2>/dev/null || true
      - name: Run npm audit (full tree) — save JSON
        run: npm audit --audit-level=low --json > npm-audit-full.json 2>/dev/null || true
      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-${{ github.run_id }}
          path: npm-audit-*.json
          retention-days: 30
      - name: Summarize audit results
        if: always()
        run: |
          echo "### Audit summary" >> $GITHUB_STEP_SUMMARY
          for f in npm-audit-*.json; do
            if [ -s "$f" ]; then
              vuln_count=$(node -e "const d=JSON.parse(require('fs').readFileSync('$f','utf8'));const m=d.metadata?.vulnerabilities||{};console.log('total:',Object.values(m).reduce((a,b)=>a+b,0)||0);" 2>/dev/null || echo "unknown")
              echo "**$f**: $vuln_count vulnerabilities" >> $GITHUB_STEP_SUMMARY
            fi
          done
