name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Type check
        run: npm run check
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Test coverage (apps/web)
        if: github.event_name == 'pull_request'
        run: cd apps/web && npx vitest run --coverage
